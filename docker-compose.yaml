services:
  flnd:
    image: ${IMAGE_NAME:-ghcr.io/myfloki/flokicoin:latest}
    container_name: flnd
    restart: unless-stopped
    ports:
      - "${FLND_PORT:-5521}:5521"
      - "${FLND_RPC_PORT:-10005}:10005"
      - "${FLND_REST_PORT:-5050}:5050"
    volumes:
      - ./data/flnd:/root/.flnd
    command: flnd --configfile=/root/.flnd/flnd.conf
    networks:
      - lokinode_network
    healthcheck:
      test: ["CMD", "ls", "/root/.flnd/tls.cert"]
      interval: 10s
      timeout: 5s
      retries: 5

  lokihub:
    image: ${IMAGE_NAME:-ghcr.io/myfloki/flokicoin:latest}
    container_name: lokihub
    restart: unless-stopped
    ports:
      - "${LOKIHUB_PORT:-1610}:1610"
    environment:
      - LN_BACKEND_TYPE=FLND
      - LND_ADDRESS=flnd:10005
      - LND_CERT_FILE=/root/.flnd/tls.cert
      - LND_MACAROON_FILE=/root/.flnd/data/chain/flokicoin/main/admin.macaroon
    volumes:
      - ./data/lokihub:/root/.local/share/lokihub
      - ./data/flnd:/root/.flnd
    command: lokihub
    depends_on:
      flnd:
        condition: service_healthy
    networks:
      - lokinode_network

networks:
  lokinode_network:
    driver: bridge
